# THROWAWAY workflow — validates the actions/checkout v6 + actions/setup-node
# v6 bumps for #44 on the actual ubuntu-latest runner image, before they ship
# in release-please.yml / test.yml. Triggers on push to this PR's branch only
# (workflow_dispatch can't be used here because GitHub only registers dispatch
# handlers from the default branch). Deleted in the same PR that merges the
# real fix.
#
# Goal: prove that v6 of both actions runs cleanly on ubuntu-latest with no
# Node 20 deprecation warning, and that the same SHA the real workflows will
# use actually resolves and executes.
name: _validate-actions-bump (throwaway, see #44)

on:
  push:
    branches: [ci/actions-node24-bump]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: report runtime versions
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "checkout SHA used: de0fac2e4500dabe0009e67214ff5f5447ce83dd (v6.0.2)"
          echo "setup-node SHA used: 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e (v6.4.0)"
