name: pr-title

# Trigger choice: `pull_request_target`, not `pull_request`.
#
# Why: this workflow lints the PR title only, and the required status
# check must report on PRs from first-time fork contributors without a
# maintainer first clicking "Approve and run". `pull_request` runs from
# new fork contributors are held pending manual approval, so the
# required check never reports and the PR sits unmergeable until
# someone notices. `pull_request_target` runs in the base repo context
# and bypasses that approval gate, so the check reports immediately on
# every PR. (The job conclusion itself is the status — no token write
# is involved; the action only reads `pull_request.title` from the
# event payload.)
#
# Footgun — DO NOT, while keeping `pull_request_target`:
#   - `actions/checkout` the PR head
#     (`ref: ${{ github.event.pull_request.head.sha }}` or similar), or
#   - interpolate any `github.event.pull_request.head.*` field
#     (`head.ref`, `head.repo.*`, etc.) into a `run:` script.
# Both execute attacker-controlled strings from a fork inside the base
# repo's context with its secrets and write token — the textbook
# `pull_request_target` RCE. A title-only linter is unlikely to grow
# either, but the warning is cheap. If this workflow ever needs to read
# PR source, switch the trigger to `pull_request` first.
#
# `permissions:` below is the minimum scope needed to contain the
# `pull_request_target` blast radius.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      # The PR title is squash-merged verbatim as the commit subject, and
      # release-please reads commit subjects to decide whether to cut a
      # release. The type list below MUST stay in sync with what
      # release-please recognizes (see AGENTS.md "Commit / PR title format").
      #
      # Adding non-listed types here (e.g. `security`) silently disables
      # release-please for those PRs. Don't.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            style
            chore
            refactor
            test
            build
            ci
          subjectPattern: ^(?![A-Z])\S.{2,}[^.]$
          subjectPatternError: |
            The subject "{subject}" in PR title "{title}" must:
            - start with a lowercase, non-whitespace character
            - be at least 4 characters long (no empty subject after `:`)
            - not end with a period.
