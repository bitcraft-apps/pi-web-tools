name: pr-title

# Trigger choice: `pull_request_target`, not `pull_request`.
#
# Why: this workflow lints the PR title only. It needs no PR code checkout,
# but it MUST post a status context back to the base repo so branch
# protection can require it — including for PRs from forks. `pull_request`
# from a fork runs in the fork's context with a read-only `GITHUB_TOKEN`
# and cannot write a required status to the base repo;
# `pull_request_target` runs in the base repo's context with a
# write-capable token, which is what we need here.
#
# Footgun — DO NOT add `actions/checkout` of the PR head
# (`ref: ${{ github.event.pull_request.head.sha }}` or similar) while
# keeping `pull_request_target`. That is the canonical pattern that
# executes attacker-controlled code from a fork with access to the base
# repo's secrets and write token. This is the textbook
# `pull_request_target` RCE. If this workflow ever needs to read PR
# source, switch the trigger to `pull_request` first.
#
# `permissions:` is deliberately scoped to `pull-requests: read` only.
# action-semantic-pull-request only reads PR metadata (title); it does
# not need write to PRs, contents, checks, or statuses. Keeping the token
# minimal contains the blast radius of the elevated
# `pull_request_target` context.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      # The PR title is squash-merged verbatim as the commit subject, and
      # release-please reads commit subjects to decide whether to cut a
      # release. The type list below MUST stay in sync with what
      # release-please recognizes (see AGENTS.md "Commit / PR title format").
      #
      # Adding non-listed types here (e.g. `security`) silently disables
      # release-please for those PRs. Don't.
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            style
            chore
            refactor
            test
            build
            ci
          subjectPattern: ^(?![A-Z])\S.{2,}[^.]$
          subjectPatternError: |
            The subject "{subject}" in PR title "{title}" must:
            - start with a lowercase, non-whitespace character
            - be at least 4 characters long (no empty subject after `:`)
            - not end with a period.
