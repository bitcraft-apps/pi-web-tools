name: PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      # The PR title is squash-merged verbatim as the commit subject, and
      # release-please reads commit subjects to decide whether to cut a
      # release. The type list below MUST stay in sync with what
      # release-please recognizes (see AGENTS.md "Commit / PR title format").
      #
      # Adding non-listed types here (e.g. `security`) silently disables
      # release-please for those PRs. Don't.
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            deps
            revert
            docs
            style
            chore
            refactor
            test
            build
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            should start with a lowercase character.
