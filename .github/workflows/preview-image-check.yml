name: preview-image-check

# pi.image in package.json is pinned to a raw.githubusercontent.com URL
# on `main`. A future force-push, rename, or repo move would 404 the
# gallery thumbnail at https://pi.dev/packages and we'd only notice
# when someone visits the page. This workflow guards against that in
# two complementary ways:
#
#   1. tree-check (pull_request)
#      Verifies the file path implied by pi.image exists in the PR's
#      working tree. No network: the PR branch's PNG isn't on
#      raw.githubusercontent.com yet, so HEADing main here would
#      either pass on stale state (PR renames the file but pi.image
#      still points at the old URL — old URL still 200s pre-merge) or
#      fail spuriously (PR introduces the file for the first time —
#      main 404s until merge). The tree check sidesteps both.
#
#   2. head-check (push to main, weekly schedule, manual)
#      Live HEAD against the published URL. Catches:
#        - local screwups the moment they land on main
#        - infra-side breakage like raw.githubusercontent.com outages
#          or asset renames done outside this repo
#
# Residual gap: a PR that renames the PNG file without updating
# pi.image will pass tree-check (file exists at new path) and pass
# head-check pre-merge (old URL still resolves on main), then fail
# head-check immediately post-merge. Acceptable: the failure is loud
# and lands within minutes of the merge.
#
# What this workflow does NOT guard:
#
# `.github/webfetch.png` is referenced from README.md but not from
# pi.image. A missing inline README image is self-evident the next
# time anyone opens the README on GitHub or npm — different failure
# mode from pi.image (whose breakage is invisible to the maintainer
# because only pi.dev visitors see it). webfetch.png is included in
# the `paths:` triggers below so adjacent edits still run the
# pi.image-focused checks, but no separate HEAD/tree check exists
# for it. See issue #117 for the decision.

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - ".github/preview.png"
      - ".github/webfetch.png"
      - ".github/workflows/preview-image-check.yml"
  pull_request:
    paths:
      - "package.json"
      - ".github/preview.png"
      - ".github/webfetch.png"
      - ".github/workflows/preview-image-check.yml"
  schedule:
    # Mondays 09:00 UTC. Weekly is enough — the asset rarely moves.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # PR-only: verify the PNG exists in the tree at the path implied by
  # pi.image. Doesn't hit the network — the PR branch's asset isn't
  # published yet. Sole purpose is catching pi.image edits that point
  # at a path that doesn't exist in the same PR.
  tree-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify pi.image points at a tracked file
        run: |
          set -euo pipefail
          url=$(node -e 'console.log(require("./package.json").pi.image)')
          echo "pi.image: $url"
          # Strip the raw.githubusercontent.com/<owner>/<repo>/<ref>/
          # prefix so we get the repo-relative path. Anchored regex —
          # if the URL shape ever changes (e.g. someone switches to a
          # CDN), this fails loudly rather than silently mis-checking.
          path=$(printf '%s' "$url" | sed -nE 's|^https://raw\.githubusercontent\.com/[^/]+/[^/]+/[^/]+/(.+)$|\1|p')
          if [ -z "$path" ]; then
            echo "ERROR: pi.image does not match the expected raw.githubusercontent.com URL shape." >&2
            echo "       Got: $url" >&2
            exit 1
          fi
          echo "expected tree path: $path"
          if [ ! -f "$path" ]; then
            echo "ERROR: pi.image points at $path but no such file exists in the PR tree." >&2
            exit 1
          fi
          echo "ok"

  # Post-merge / scheduled: actually HEAD the published URL. This is
  # what catches force-pushes, file renames done outside this repo,
  # and raw.githubusercontent.com outages.
  head-check:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: HEAD pi.image URL
        run: |
          set -euo pipefail
          url=$(node -e 'console.log(require("./package.json").pi.image)')
          echo "checking: $url"
          # -L follows redirects; -f makes 4xx/5xx exit non-zero.
          # --retry covers transient raw.githubusercontent.com hiccups.
          curl -fsSLI --retry 3 --retry-delay 5 --max-time 20 "$url" >/dev/null
          echo "ok"
