name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token from the `bitcraft-release` GitHub App
      # so release PRs/commits aren't authored by GITHUB_TOKEN. GitHub deliberately
      # suppresses workflow runs for events produced by a workflow's own GITHUB_TOKEN
      # (recursion guard, see issue #28). App-authored events bypass that guard, so
      # the `vitest (bun)` check on `pull_request` actually runs on release PRs.
      # SHA-pinned to v3.1.1 per the existing third-party-action hardening posture.
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      # Pinned to v4 tag commit (5c625bf) per GitHub hardening guidance for third-party actions.
      - id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    name: publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance via OIDC
    steps:
      # First-party actions SHA-pinned for the same reason as release-please-action above
      # (cf. tj-actions/changed-files CVE-2025-30066 — first-party tags can be moved too).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # Node 22.x ships with npm >= 10.9.x. We swap it for 11.5.1 via corepack
      # below — see the long comment on the install step for why.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 LTS bundles npm 10.9.x; npm registry requires >= 11.5.1 for Trusted
      # Publishing (OIDC). corepack is used instead of `npm i -g` because the bundled
      # npm 10.x has shipped broken in the toolcache and can't self-upgrade (see #42).
      # `corepack install -g` needs a concrete version, so 11.5.1 is pinned exactly;
      # the assert step below is the loud-failure backstop.
      - name: install npm 11.5.1 via corepack (bypass broken bundled npm, see #42)
        run: |
          corepack enable npm
          corepack install -g npm@11.5.1

      # setup-node writes ~/.npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`.
      # Under Trusted Publishing we deliberately do NOT set NODE_AUTH_TOKEN, so that line
      # would resolve to an empty token. Strip it defensively so npm 11.5.1 can't ever
      # interpret a bogus stale entry instead of taking the OIDC path.
      - name: scrub stale _authToken from .npmrc (OIDC only)
        run: |
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken=/d' "$HOME/.npmrc"
            echo "--- ~/.npmrc after scrub ---"
            cat "$HOME/.npmrc" || true
          fi

      # Fail loud if npm is too old for Trusted Publishing instead of silently 401-ing
      # (or worse, falling back to an unauthenticated/legacy publish path).
      - name: assert npm >= 11.5.1 (Trusted Publishing minimum)
        run: |
          npm_version=$(npm --version)
          echo "npm version: ${npm_version}"
          node -e "
            const [a,b,c] = process.argv[1].split('.').map(Number);
            const ok = a > 11 || (a === 11 && (b > 5 || (b === 5 && c >= 1)));
            if (!ok) { console.error('npm ' + process.argv[1] + ' < 11.5.1 — Trusted Publishing unsupported'); process.exit(1); }
          " "${npm_version}"

      # No build step (jiti loads raw .ts at consumer side) and no install needed
      # to publish — only devDependencies exist and they aren't part of the tarball.
      # Guard against re-runs on an already-published tag (npm would 403 otherwise).
      #
      # Auth: npm Trusted Publishing via OIDC. The id-token: write permission above
      # lets npm exchange the GitHub OIDC token for a short-lived publish credential,
      # gated server-side on the trusted publisher registered for this package
      # (org: bitcraft-apps, repo: pi-web-tools, workflow: release-please.yml).
      # No NPM_TOKEN secret needed.
      #
      # TODO(#21): after the first successful OIDC publish, delete the NPM_TOKEN org
      # secret so it doesn't linger as a forgotten long-lived credential. Tracked in
      # the follow-up task list on issue #21.
      - name: publish to npm (skip if version already exists)
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published — skipping."
          else
            npm publish --access public --provenance
          fi
