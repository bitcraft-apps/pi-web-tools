name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned to match release-please.yml (cf. tj-actions/changed-files
      # CVE-2025-30066 — first-party tags can be moved). v6 ships as a
      # Node 24 action; this job otherwise runs bun, not Node.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TODO(#46): SHA-pin oven-sh/setup-bun to match the hardening posture
      # used for the sibling first-party action above.
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin for reproducibility; bump manually or via Dependabot.
          bun-version: 1.3.6

      - run: bun install --frozen-lockfile

      - run: bun run test
