name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned to match release-please.yml. v6 ships as a Node 24
      # action; this job otherwise runs bun, not Node.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # SHA-pinned for the same reason as actions/checkout above.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin for reproducibility; bump manually or via Dependabot.
          bun-version: 1.3.6

      - run: bun install --frozen-lockfile

      # Type-check before tests: type errors are a cheaper signal than
      # a full vitest run, and vitest (esbuild) strips types without
      # checking them. tsgo is @typescript/native-preview, pinned exact
      # in package.json (preview channel — no semver, daily dev builds).
      # Bump cadence: refresh roughly weekly; track issue #50.
      # Escape hatch if tsgo regresses on a real diagnostic: temporarily
      # swap this step for `bunx -p typescript tsc --noEmit -p tsconfig.json`
      # (and add `typescript` back to devDependencies) until the next
      # @typescript/native-preview release lands.
      - run: bun run typecheck

      # Lint between typecheck and test: type errors are the cheapest signal,
      # lint is the next-cheapest, vitest is heaviest. Type-aware oxlint via
      # oxlint-tsgolint (Go binary using typescript-go, same engine family as
      # the @typescript/native-preview pinned above per #50). Both oxlint and
      # oxlint-tsgolint are exact-pinned in package.json. --deny-warnings
      # ensures any rule we ever set to "warn" still fails CI; current config
      # uses "error" exclusively, so this is forward-looking insurance.
      # Adoption rationale: see #82 (overrides #52).
      - run: bun run lint

      - run: bun run test
