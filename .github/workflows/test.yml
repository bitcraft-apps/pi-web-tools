name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin for reproducibility; bump manually or via Dependabot.
          bun-version: 1.3.6

      - run: bun install --frozen-lockfile

      - run: bun run test
